<!-- Firebase -->
<script type="module">
const FB = {
  apiKey:            "AIzaSyDZfrZlYROfbMndYCjaecfSVu_FDIDxq4Y",
  authDomain:        "universe-ai-c3a82.firebaseapp.com",
  projectId:         "universe-ai-c3a82",
  storageBucket:     "universe-ai-c3a82.firebasestorage.app",
  messagingSenderId: "215097128319",
  appId:             "1:215097128319:web:8fa5f0f688fe567673564a"
};

const {initializeApp}   = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
const {getAuth,onAuthStateChanged,GoogleAuthProvider,signInWithPopup,signOut}
  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
const {getFirestore,doc,collection,setDoc,onSnapshot,serverTimestamp,query,orderBy,limit}
  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);
let uid = null, unsubs = [];

onAuthStateChanged(auth, user => {
  if (user) { uid = user.uid; onIn(user); }
  else       { uid = null; onOut(); }
});

function startSync() {
  unsubs.forEach(u=>u()); unsubs=[];
  const q = query(collection(db,'users',uid,'history'),orderBy('updatedAt','desc'),limit(200));
  unsubs.push(onSnapshot(q, snap => {
    snap.docChanges().forEach(ch => {
      const id=ch.doc.id, d=ch.doc.data();
      if(ch.type==='removed'){delete ST.hist[id];return;}
      ST.hist[id]=d.entries||[];
      if(ST.agentId===id) refreshHist(id);
      buildSB();
    });
  }));
  unsubs.push(onSnapshot(doc(db,'users',uid,'meta','inputs'), snap => {
    if(snap.exists()){
      Object.assign(ST.inputs, snap.data());
      const ta=document.getElementById('ta-'+ST.agentId);
      if(ta&&!ta.dataset.f) ta.value=ST.inputs[ST.agentId]||'';
    }
  }));
}

window._saveHist = async id => {
  if(!uid) return;
  await setDoc(doc(db,'users',uid,'history',id),{entries:ST.hist[id]||[],updatedAt:serverTimestamp()});
};
window._saveInput = async (id,v) => {
  if(!uid) return;
  await setDoc(doc(db,'users',uid,'meta','inputs'),{[id]:v},{merge:true});
};
window._signOut = async () => { unsubs.forEach(u=>u()); await signOut(auth); };

function onIn(user) {
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('uav').textContent=(user.displayName||'U').charAt(0).toUpperCase();
  document.getElementById('um-name').textContent=user.displayName||'User';
  document.getElementById('um-email').textContent=user.email||'';
  startSync();
  showHome();
}
function onOut() {
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
}

window._googleIn = async () => {
  try { await signInWithPopup(auth,new GoogleAuthProvider()); }
  catch(e) { document.getElementById('auth-err').textContent=e.message; }
};
</script>

    <div class="card"><div class="card-hd">Send task to ${ag.name}</div>${tb(id)}</div>
    ${hb(id)}<div style="height:10px"></div>
  </div>`);
}
window.openAgent=openAgent;

function tb(id){
  const saved=ST.inputs[id]||'';
  return `<textarea id="ta-${id}" placeholder="Type your task for ${A[id].name}..." rows="3"
    oninput="ST.inputs['${id}']=this.value;dS('${id}',this.value)"
    onfocus="this.dataset.f=1" onblur="this.dataset.f=0">${saved}</textarea>
  <button class="run-btn" id="rb-${id}" onclick="runAgent('${id}')"><span id="rbi-${id}">▶</span>  Run ${A[id].name}</button>
  <button class="clr-btn" onclick="clrTask('${id}')">Clear</button>
  <div class="resp" id="rw-${id}"><div class="resp-lbl">Response from ${A[id].name}</div>
  <div class="resp-txt" id="rt-${id}"></div><div class="tg-note" id="tn-${id}">📨 Sent to Telegram</div></div>`;
}
function hb(id){
  const h=ST.hist[id]||[];
  return `<div class="card" id="hb-${id}"><div class="card-hd">Task history · synced</div>`+
    (h.length?h.map(x=>`<div class="hist-item"><div class="hist-q">↳ ${x.task}</div><div class="hist-a">${x.resp}</div>${x.ts?`<div class="hist-ts">${new Date(x.ts).toLocaleString()}</div>`:''}</div>`).join(''):`<div class="no-hist">No tasks yet</div>`)+'</div>';
}
function ws(html){document.getElementById('ws').innerHTML=html;document.getElementById('ws').scrollTop=0;}

let _it={};
function dS(id,v){clearTimeout(_it[id]);_it[id]=setTimeout(()=>{if(window._saveInput){showSaving();window._saveInput(id,v);}},1000);}
function setTask(id,text){const el=document.getElementById('ta-'+id);if(el){el.value=text;ST.inputs[id]=text;el.focus();}}
function clrTask(id){const el=document.getElementById('ta-'+id);if(el){el.value='';ST.inputs[id]='';}const rw=document.getElementById('rw-'+id);if(rw)rw.classList.remove('on');}
window.setTask=setTask;window.clrTask=clrTask;

async function runAgent(id){
  const ag=A[id];
  const inp=document.getElementById('ta-'+id);
  const task=inp?.value.trim();
  if(!task){inp?.focus();return;}
  ST.inputs[id]=task;
  const btn=document.getElementById('rb-'+id),bico=document.getElementById('rbi-'+id);
  const rw=document.getElementById('rw-'+id),rt=document.getElementById('rt-'+id),tn=document.getElementById('tn-'+id);
  if(btn)btn.disabled=true;
  if(bico)bico.innerHTML='<span class="spin"></span>';
  ST.running.add(id);buildSB();
  if(rw)rw.classList.add('on');
  if(rt){rt.className='resp-txt thinking';rt.textContent=ag.name+' is thinking...';}
  if(tn)tn.classList.remove('on');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:ag.model==='Sonnet'?'claude-sonnet-4-20250514':'claude-haiku-4-5',
        max_tokens:1500,system:ag.prompt,messages:[{role:'user',content:task}]})
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||'No response.';
    if(rt){rt.className='resp-txt';rt.textContent=txt;}
    if(!ST.hist[id])ST.hist[id]=[];
    ST.hist[id].unshift({task,resp:txt,ts:Date.now()});
    if(ST.hist[id].length>10)ST.hist[id].pop();
    if(window._saveHistory){showSaving();await window._saveHistory(id);}
    if(id==='ceo'&&window.sendTG){await sendTG(txt);if(tn)tn.classList.add('on');}
    refreshHist(id);
  }catch(e){if(rt){rt.className='resp-txt';rt.textContent='Error: '+e.message;}}
  finally{ST.running.delete(id);if(btn)btn.disabled=false;if(bico)bico.textContent='▶';buildSB();}
}
window.runAgent=runAgent;

function refreshHist(id){
  const hb2=document.getElementById('hb-'+id);if(!hb2)return;
  const h=ST.hist[id]||[];
  hb2.innerHTML=`<div class="card-hd">Task history · synced</div>`+
    (h.length?h.map(x=>`<div class="hist-item"><div class="hist-q">↳ ${x.task}</div><div class="hist-a">${x.resp}</div>${x.ts?`<div class="hist-ts">${new Date(x.ts).toLocaleString()}</div>`:''}</div>`).join(''):`<div class="no-hist">No tasks yet</div>`);
}
window.addEventListener('resize',()=>{buildSB();if(!mob())document.getElementById('back-btn').style.display='none';});
</script>
</body>
</html>
